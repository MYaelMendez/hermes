<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Code Runtime</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0c;
      --fg: #f5c542;
      --fg-dim: #b4962f;
      --border: #2a2317;
      --surface: #111110;
      --content: #1e1d1b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      line-height: 1.55;
      min-height: 100vh;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 22px;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 22px;
    }

    .runtime-state {
      display: grid;
      gap: 12px;
    }

    .runtime-shell {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px 16px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .k {
      color: var(--fg-dim);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      align-self: center;
    }

    .v {
      color: var(--fg);
      font-size: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      word-break: break-word;
    }

    .status-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--fg);
      box-shadow: 0 0 0 1px var(--border);
      display: inline-block;
    }

    .status-dot.idle {
      background: #6f5e24;
      box-shadow: 0 0 0 1px #2e2710;
    }

    .status-dot.running {
      background: var(--fg);
      box-shadow: 0 0 0 1px #3a3015;
    }

    a.cta {
      color: var(--bg);
      background: var(--fg);
      text-decoration: none;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: inline-block;
      margin-top: 18px;
      border: 1px solid var(--fg);
    }

    a.cta:hover {
      background: #e6b83b;
    }

    .meta {
      margin-top: 18px;
      color: var(--fg-dim);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hermes Code Runtime</h1>

    <section class="runtime-state" aria-label="Runtime state">
      <div class="runtime-shell">
        <div class="k">state</div>
        <div class="v">
          <span class="status-line">
            <span id="statusDot" class="status-dot idle" aria-label="status"></span>
            <span id="statusText">idle</span>
          </span>
        </div>

        <div class="k">surface</div>
        <div class="v">http://127.0.0.1:4212</div>

        <div class="k">version</div>
        <div class="v">0.1</div>

        <div class="k">token</div>
        <div class="v" id="token">—</div>

        <div class="k">timestamp</div>
        <div class="v" id="timestamp">—</div>
      </div>
    </section>

    <a class="cta" href="hermes-superagent://status" id="statusCta">hermes-superagent://status</a>

    <p class="meta">
      Hermes Code Player extension stub • VLC Lua surface • HTTP 127.0.0.1:4212
    </p>
  </main>

  <script>
    (function () {
      'use strict';
      const token = localStorage.getItem('hermes_code_token') || '';
      document.getElementById('token').textContent = token ? 'present' : '—';
      document.getElementById('timestamp').textContent = new Date().toISOString();

      const cta = document.getElementById('statusCta');
      cta.addEventListener('click', function(event) {
        event.preventDefault();
        window.location.href = 'hermes-superagent://status';
      });
    })();
  </script>
</body>
</html>
