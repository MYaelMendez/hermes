name: Glocal Integrity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "contest-submission/**"
      - "scripts/verify_submission_integrity.py"
      - "scripts/glocal_context_map.py"
      - "glocal-monorepo.json"
      - ".github/workflows/glocal-integrity.yml"
  push:
    branches: ["main"]
    paths:
      - "contest-submission/**"
      - "scripts/verify_submission_integrity.py"
      - "scripts/glocal_context_map.py"
      - "glocal-monorepo.json"
      - ".github/workflows/glocal-integrity.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify Submission Integrity
        run: python scripts/verify_submission_integrity.py
      - name: Emit Glocal Context Map
        run: python scripts/glocal_context_map.py > glocal-context-map.json
      - name: Upload Context Map Artifact
        uses: actions/upload-artifact@v4
        with:
          name: glocal-context-map
          path: glocal-context-map.json
